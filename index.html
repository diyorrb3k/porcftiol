<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diyor Developer — Luxury Websites for Modern Startups</title>
  <meta name="description" content="Diyor Developer designs and builds high-converting, luxury websites with flawless motion for ambitious startups and creative tech teams." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&family=Space+Grotesk:wght=500;600;700&family=JetBrains+Mono:wght=400;500&display=swap" rel="stylesheet" />
  
  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            display: ['"Space Grotesk"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>
  
  <style>
    /* 1. Smooth Scrolling qo'shildi */
    html {
      scroll-behavior: smooth;
    }
    html, body { background:#0b0b0f; color:#fff; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
    .text-gradient-silver{
      background:linear-gradient(180deg,#fff 0%,#c7c7d1 55%,#8a8a99 100%);
      -webkit-background-clip:text; background-clip:text; color:transparent;
    }
    .text-gradient-neon{
      background:linear-gradient(90deg,#a78bfa 0%,#22d3ee 100%);
      -webkit-background-clip:text; background-clip:text; color:transparent;
    }
    .grid-bg{
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size:56px 56px;
      -webkit-mask-image:radial-gradient(ellipse at center, black 40%, transparent 85%);
              mask-image:radial-gradient(ellipse at center, black 40%, transparent 85%);
    }
    .glow-orb{ position:absolute; border-radius:9999px; filter:blur(90px); opacity:.55; pointer-events:none; }
    .card-glass{
      background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.015));
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);
    }
    .btn-primary-glow{
      background:linear-gradient(135deg,#7c3aed 0%,#a855f7 50%,#6366f1 100%);
      box-shadow:0 10px 30px -10px rgba(124,58,237,.6), inset 0 1px 0 rgba(255,255,255,.2);
      transition:transform .25s ease, box-shadow .25s ease, filter .25s ease;
      color:#fff;
    }
    .btn-primary-glow:hover{
      transform:translateY(-2px) scale(1.02);
      box-shadow:0 20px 50px -12px rgba(124,58,237,.9), 0 0 40px rgba(168,85,247,.4);
      filter:brightness(1.1);
    }
    @keyframes pulse-dot { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.7);} 50%{box-shadow:0 0 0 10px rgba(16,185,129,0);} }
    .pulse-dot{ animation:pulse-dot 2s infinite; }
    @keyframes float-slow { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(30px,-20px) scale(1.05);} }
    .float-slow{ animation:float-slow 14s ease-in-out infinite; }
    @keyframes float-slower { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-40px,30px) scale(1.08);} }
    .float-slower{ animation:float-slower 18s ease-in-out infinite; }
    @keyframes rise { from{opacity:0;transform:translateY(24px);} to{opacity:1;transform:translateY(0);} }
    .rise{ animation:rise .8s ease-out both; }
  </style>
</head>
<body class="overflow-x-hidden">
  <div id="root"></div>

  <!-- React + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script type="text/babel" data-presets="react">
    const { useEffect, useState } = React;

    // Helper: Lucide ikonalarini render qilish uchun
    function Icon({ name, className = "h-4 w-4" }) {
      useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
      return <i data-lucide={name} className={className}></i>;
    }

    /* ---------------- Main Portfolio Component ---------------- */
    function Portfolio() {
      const [selectedProject, setSelectedProject] = useState(null);

      // Modal ochiqligida orqa fon skrollini to'xtatish (Accessibility)
      useEffect(() => {
        if (selectedProject) {
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = 'unset';
        }
      }, [selectedProject]);

      return (
        <div className="relative min-h-screen overflow-x-hidden bg-[#0b0b0f] text-white font-sans antialiased">
          <Nav />
          <Hero />
          <Stats />
          <Projects onSelectProject={setSelectedProject} />
          <TechStack />
          <Testimonials />
          <Contact />
          <Footer />

          {/* Project Details Modal */}
          {selectedProject && (
            <ProjectModal project={selectedProject} onClose={() => setSelectedProject(null)} />
          )}
        </div>
      );
    }

    /* ---------------- Nav ---------------- */
    function Nav() {
      return (
        <header className="fixed top-0 inset-x-0 z-50">
          <div className="mx-auto mt-4 max-w-6xl px-4">
            <div className="flex items-center justify-between rounded-2xl card-glass px-4 py-3">
              <a href="#top" className="flex items-center gap-2" aria-label="Diyor.dev Homepage">
                <span className="grid place-items-center h-8 w-8 rounded-lg bg-gradient-to-br from-violet-500 to-cyan-400 text-black font-bold" aria-hidden="true">D</span>
                <span className="font-display font-semibold tracking-tight">
                  Diyor<span className="text-white/50">.dev</span>
                </span>
              </a>
              <nav className="hidden md:flex items-center gap-7 text-sm text-white/70" aria-label="Main Navigation">
                <a href="#work" className="hover:text-white transition">Work</a>
                <a href="#stack" className="hover:text-white transition">Stack</a>
                <a href="#reviews" className="hover:text-white transition">Reviews</a>
                <a href="#contact" className="hover:text-white transition">Contact</a>
              </nav>
              <a href="#contact" className="text-sm rounded-lg px-3.5 py-2 btn-primary-glow font-medium">Let's Talk</a>
            </div>
          </div>
        </header>
      );
    }

    /* ---------------- Hero ---------------- */
    function Hero() {
      return (
        <section id="top" className="relative pt-36 pb-28 md:pt-44 md:pb-36">
          <div className="pointer-events-none absolute inset-0 -z-10">
            <div className="grid-bg absolute inset-0" />
            <div className="glow-orb float-slow" style={{width:520,height:520,background:"#7c3aed",top:-120,left:-140}} />
            <div className="glow-orb float-slower" style={{width:560,height:560,background:"#06b6d4",top:60,right:-160}} />
            <div className="glow-orb" style={{width:380,height:380,background:"#a855f7",bottom:-160,left:"35%",opacity:.35}} />
          </div>
          <div className="mx-auto max-w-6xl px-4">
            <div className="mx-auto flex max-w-xl items-center justify-center gap-2 rounded-full card-glass px-4 py-1.5 text-xs text-white/80 rise">
              <span className="relative flex h-2.5 w-2.5">
                <span className="absolute inline-flex h-full w-full rounded-full bg-emerald-400 pulse-dot" />
                <span className="relative inline-flex h-2.5 w-2.5 rounded-full bg-emerald-400" />
              </span>
              Available for new projects · Q3 2026
            </div>
            <h1 className="mt-8 text-center font-display font-semibold tracking-tight text-[44px] leading-[1.05] sm:text-6xl md:text-7xl rise">
              <span className="text-gradient-silver block">Luxury websites,</span>
              <span className="text-gradient-neon block">engineered to convert.</span>
            </h1>
            <p className="mx-auto mt-6 max-w-2xl text-center text-base md:text-lg text-white/75 leading-relaxed rise">
              I'm Diyor — a freelance web developer designing and shipping high-converting, motion-rich websites for ambitious startups, founders, and creative tech teams across the US &amp; EU.
            </p>
            <div className="mt-9 flex flex-wrap items-center justify-center gap-3 rise">
              <a href="#contact" className="group inline-flex items-center gap-2 rounded-xl btn-primary-glow px-5 py-3 text-sm font-semibold">
                Let's Talk <Icon name="arrow-up-right" />
              </a>
              <a href="#work" className="inline-flex items-center gap-2 rounded-xl border border-white/25 bg-white/[0.08] px-5 py-3 text-sm font-semibold text-white hover:bg-white/[0.14] hover:border-white/45 transition shadow-[0_0_16px_-6px_rgba(255,255,255,0.08)]">
                View Work <Icon name="arrow-right" />
              </a>
            </div>
            <div className="mt-10 flex flex-wrap items-center justify-center gap-x-6 gap-y-2 text-xs text-white/50 rise">
              <span className="inline-flex items-center gap-1.5"><Icon name="check" className="h-3.5 w-3.5 text-emerald-400" /> Design + build</span>
              <span className="inline-flex items-center gap-1.5"><Icon name="check" className="h-3.5 w-3.5 text-emerald-400" /> Framer-grade motion</span>
              <span className="inline-flex items-center gap-1.5"><Icon name="check" className="h-3.5 w-3.5 text-emerald-400" /> Ship in 1–3 weeks</span>
            </div>
          </div>
        </section>
      );
    }

    /* ---------------- Stats ---------------- */
    function Stats() {
      const items = [
        { k: "5+", v: "Years of Experience" },
        { k: "40+", v: "Satisfied Global Clients" },
        { k: "5.0", v: "Average Star Reviews", star: true },
        { k: "98%", v: "On-time Delivery" },
      ];
      return (
        <section className="relative py-10">
          <div className="mx-auto max-w-6xl px-4">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 rounded-2xl card-glass p-4 md:p-6">
              {items.map((it,i)=>(
                <div key={i} className="relative rounded-xl px-4 py-5 md:py-6 text-center hover:bg-white/[0.03] transition">
                  <div className="flex items-center justify-center gap-1.5 text-3xl md:text-4xl font-display font-semibold text-gradient-silver">
                    {it.k}
                    {it.star && <Icon name="star" className="h-4 w-4 text-amber-400 fill-amber-400" />}
                  </div>
                  <div className="mt-1 text-xs md:text-sm text-white/60">{it.v}</div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ---------------- Projects ---------------- */
    function Projects({ onSelectProject }) {
      const projects = [
        { name:"Aether", tag:"Web3 · Crypto App",
          desc:"Tech-forward interface for a next-gen on-chain trading protocol. Deep dark UI with vibrant purple/neon accents and real-time data motion.",
          longDesc: "Aether required a highly robust real-time interface that stays fluid under heavy data load. Built using cutting-edge reactive state management, the dashboard provides fractions-of-a-second updates on liquidity pools, token swapping indexes, and custom cross-chain bridging metrics.",
          metrics: ["140ms average response time", "99.98% WebSocket uptime", "Integrated with 4 distinct chains"],
          span:"md:col-span-2 md:row-span-2", accent:"124,58,237", visual:<AetherVisual/> },
        { name:"Nexus", tag:"AI Startup · Landing Page",
          desc:"Monochromatic base with striking neon blue highlights and ultra-sharp typography.",
          longDesc: "Nexus is an AI SaaS platform tailored for power users. The goal was an elite-tier visual narrative emphasizing extreme speed. Every element was optimized for sub-second page loading, accompanied by buttery smooth GPU-accelerated layout transitions.",
          metrics: ["100/100 Lighthouse Performance score", "+42% Conversion Rate boost", "Shipped in exactly 5 days"],
          span:"md:col-span-1", accent:"6,182,212", visual:<NexusVisual/> },
        { name:"Chronos", tag:"Motion Design Agency",
          desc:"Artistic dark layout with fluid, colourful gradients and liquid animation design.",
          longDesc: "Chronos demanded an artistic direction that pushed the boundaries of standard web layouts. Implementing dynamic canvas styling and sophisticated vector morphing, the final build mirrors the premium nature of their high-concept motion films.",
          metrics: ["Custom WebGL fluid mechanics", "Interactive 3D particle grid", "Awarded Site of the Day nomination"],
          span:"md:col-span-1", accent:"236,72,153", visual:<ChronosVisual/> },
        { name:"Pulse", tag:"Fintech · SaaS Dashboard",
          desc:"Clean, structured product with deep emerald accents. Highly premium and secure.",
          longDesc: "Pulse is a corporate financial suite with deep-level charts and secure audit logs. It features strict regulatory data tables, pixel-perfect dark components, complex SVGs showing granular cash flow trajectories, and full client-side encryption modules.",
          metrics: ["SOC-2 Compliance interface built", "Zero layout shift during live data", "Handles $2.4M+ daily volume"],
          span:"md:col-span-2", accent:"16,185,129", visual:<PulseVisual/> },
      ];

      return (
        <section id="work" className="relative py-24 md:py-32">
          <div className="pointer-events-none absolute inset-0 -z-10">
            <div className="glow-orb" style={{width:500,height:500,background:"#7c3aed",top:"20%",left:"-10%",opacity:.25}} />
          </div>
          <div className="mx-auto max-w-6xl px-4">
            <SectionHeader
              eyebrow="Selected Work"
              title={<><span className="text-gradient-silver">Products that feel</span> <span className="text-gradient-neon">inevitable.</span></>}
              sub="A tight edit of recent freelance work — click any card to see project specifications."
            />
            <div className="mt-12 grid grid-cols-1 md:grid-cols-3 md:auto-rows-[240px] gap-4 md:gap-5">
              {projects.map((p,i)=>(
                <button 
                  key={i} 
                  onClick={() => onSelectProject(p)}
                  className="text-left block w-full focus:outline-none focus:ring-2 focus:ring-violet-500 rounded-2xl"
                  aria-haspopup="dialog"
                  aria-label={`View details for project ${p.name}`}
                >
                  <ProjectCard p={p} />
                </button>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function ProjectCard({ p }) {
      return (
        <article className={`group relative overflow-hidden rounded-2xl card-glass p-5 md:p-6 transition-all duration-500 hover:-translate-y-1 h-full flex flex-col justify-between gap-4 ${p.span}`}>
          <div className="pointer-events-none absolute -inset-px rounded-2xl opacity-0 group-hover:opacity-100 transition duration-500"
               style={{boxShadow:`0 0 0 1px rgba(${p.accent},0.55), 0 30px 80px -20px rgba(${p.accent},0.35)`}} />
          <div className="relative flex h-full flex-col justify-between gap-4 w-full">
            <div className="flex items-start justify-between gap-3">
              <div>
                <div className="text-[11px] uppercase tracking-[0.14em] text-white/50">{p.tag}</div>
                <h3 className="mt-1 font-display text-2xl md:text-[28px] font-semibold text-white">{p.name}</h3>
              </div>
              <div className="grid h-9 w-9 place-items-center rounded-full border border-white/10 bg-white/[0.03] transition group-hover:rotate-[-20deg]"
                   style={{color:`rgb(${p.accent})`}}>
                <Icon name="arrow-up-right" />
              </div>
            </div>
            <div className="relative flex-1 min-h-[110px] overflow-hidden rounded-xl border border-white/10 bg-black/40 transition-transform duration-700 group-hover:scale-[1.02]">
              {p.visual}
            </div>
            <p className="text-sm text-white/70 leading-relaxed line-clamp-2">{p.desc}</p>
          </div>
        </article>
      );
    }

    /* Project Visuals unchanged */
    function AetherVisual() {
      return (
        <div className="relative h-full w-full">
          <div className="absolute inset-0 bg-[radial-gradient(circle_at_30%_20%,rgba(124,58,237,0.55),transparent_55%),radial-gradient(circle_at_80%_80%,rgba(99,102,241,0.5),transparent_60%)]" />
          <div className="absolute inset-0 grid-bg opacity-60" />
          <div className="absolute inset-0 flex items-center justify-center">
            <div className="w-[70%] rounded-xl border border-white/15 bg-black/50 p-4 backdrop-blur-md shadow-2xl">
              <div className="flex items-center justify-between text-[10px] text-white/60">
                <span>AETHER · ETH/USDC</span><span className="text-emerald-400">+18.42%</span>
              </div>
              <div className="mt-3 flex items-end gap-1 h-14">
                {[30,45,38,62,55,72,68,84,78,92,88,100].map((h,i)=>(
                  <div key={i} className="flex-1 rounded-sm" style={{height:`${h}%`, background:"linear-gradient(180deg,#a78bfa,#7c3aed)"}} />
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }
    function NexusVisual() {
      return (
        <div className="relative h-full w-full">
          <div className="absolute inset-0 bg-[radial-gradient(circle_at_70%_30%,rgba(6,182,212,0.5),transparent_60%)]" />
          <div className="absolute inset-0 flex flex-col items-center justify-center px-4 text-center">
            <div className="text-[10px] uppercase tracking-[0.3em] text-cyan-300/80">Nexus AI</div>
            <div className="mt-2 font-display text-2xl font-semibold text-gradient-silver">Thinking, faster.</div>
          </div>
        </div>
      );
    }
    function ChronosVisual() {
      return (
        <div className="relative h-full w-full overflow-hidden">
          <div className="absolute -inset-8 bg-[conic-gradient(from_0deg_at_50%_50%,#ec4899,#8b5cf6,#06b6d4,#f59e0b,#ec4899)] blur-2xl opacity-70" />
          <div className="absolute inset-0 flex items-center justify-center">
            <div className="font-display text-3xl font-semibold text-white mix-blend-overlay">Chronos ⟶</div>
          </div>
        </div>
      );
    }
    function PulseVisual() {
      return (
        <div className="relative h-full w-full">
          <div className="absolute inset-0 bg-[radial-gradient(circle_at_20%_80%,rgba(16,185,129,0.45),transparent_60%)]" />
          <div className="absolute inset-4 grid grid-cols-3 gap-2">
            <div className="rounded-lg border border-white/10 bg-white/[0.03] p-2">
              <div className="text-[8px] text-white/50">Revenue</div>
              <div className="text-xs font-semibold text-white">$248.9k</div>
            </div>
            <div className="col-span-2 rounded-lg border border-white/10 bg-white/[0.03] p-2">
              <svg viewBox="0 0 200 60" className="h-6 w-full">
                <path d="M0,45 C30,20 50,50 80,30 L200,25" stroke="#10b981" strokeWidth="1.5" fill="none" />
              </svg>
            </div>
          </div>
        </div>
      );
    }

    /* ---------------- Project Modal (3. Project Details) ---------------- */
    function ProjectModal({ project, onClose }) {
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md animate-fade-in" role="dialog" aria-modal="true" aria-labelledby="modal-title">
          <div className="relative w-full max-w-2xl overflow-hidden rounded-2xl bg-[#0f0f15] border border-white/10 shadow-2xl p-6 md:p-8 max-h-[90vh] overflow-y-auto">
            <button 
              onClick={onClose} 
              className="absolute top-4 right-4 text-white/50 hover:text-white transition p-2 rounded-lg hover:bg-white/5"
              aria-label="Close modal"
            >
              <Icon name="x" className="h-5 w-5" />
            </button>
            <div>
              <span className="text-xs uppercase tracking-widest text-white/40">{project.tag}</span>
              <h2 id="modal-title" className="mt-1 font-display text-3xl md:text-4xl font-bold text-gradient-silver">{project.name} Specifications</h2>
              
              <div className="mt-6 aspect-video w-full overflow-hidden rounded-xl border border-white/10 bg-black/50">
                {project.visual}
              </div>

              <div className="mt-6">
                <h4 className="text-xs uppercase font-semibold text-violet-400 tracking-wider">Project Overview</h4>
                <p className="mt-2 text-white/75 text-sm md:text-base leading-relaxed">{project.longDesc}</p>
              </div>

              <div className="mt-6 border-t border-white/10 pt-6">
                <h4 className="text-xs uppercase font-semibold text-cyan-400 tracking-wider mb-3">Key Benchmarks & Metrics</h4>
                <ul className="space-y-2">
                  {project.metrics.map((metric, idx) => (
                    <li key={idx} className="flex items-center gap-2 text-sm text-white/80">
                      <Icon name="check-circle" className="h-4 w-4 text-emerald-400 shrink-0" />
                      {metric}
                    </li>
                  ))}
                </ul>
              </div>

              <div className="mt-8 flex justify-end">
                <button onClick={onClose} className="px-5 py-2.5 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 text-sm font-medium transition">
                  Close Review
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ---------------- Tech Stack ---------------- */
    function TechStack() {
      const stack = [
        { name:"React", c:"#61dafb" }, { name:"TypeScript", c:"#60a5fa" },
        { name:"Tailwind CSS", c:"#22d3ee" }, { name:"Framer Motion", c:"#f472b6" },
        { name:"Next.js", c:"#ffffff" }, { name:"Lovable", c:"#a78bfa" },
        { name:"Supabase", c:"#34d399" }, { name:"Node.js", c:"#84cc16" },
        { name:"Vercel", c:"#e5e7eb" }, { name:"Figma", c:"#fb7185" },
      ];
      return (
        <section id="stack" className="relative py-24 md:py-32">
          <div className="pointer-events-none absolute inset-0 -z-10">
            <div className="glow-orb" style={{width:520,height:520,background:"#06b6d4",top:"10%",right:"-10%",opacity:.28}} />
          </div>
          <div className="mx-auto max-w-6xl px-4">
            <SectionHeader
              eyebrow="Tech Stack"
              title={<><span className="text-gradient-silver">Modern tools.</span> <span className="text-gradient-neon">Zero compromises.</span></>}
              sub="A lean, battle-tested stack chosen for speed, DX, and long-term maintainability."
            />
            <div className="mt-10 flex flex-wrap justify-center gap-2.5">
              {stack.map(t=>(
                <span key={t.name}
                  className="group cursor-default rounded-full border border-white/12 bg-white/[0.03] px-4 py-2 text-sm text-white/80 transition hover:bg-white/[0.06] hover:border-white/25"
                  onMouseEnter={(e)=>{ e.currentTarget.style.color=t.c; e.currentTarget.style.borderColor=`${t.c}55`; }}
                  onMouseLeave={(e)=>{ e.currentTarget.style.color=""; e.currentTarget.style.borderColor=""; }}
                >{t.name}</span>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ---------------- Testimonials ---------------- */
    function Testimonials() {
      const reviews = [
        { body:"bro turned my messy wireframe into a literal masterpiece in 3 days. straight up wizardry. ngl i was skeptical at first but the micro-animations are clean fr. 11/10", name:"Alex M.", role:"Indie Hacker" },
        { body:"Diyor is incredibly fast. The landing page he built doubled our conversion rate in the first week. Communication was super smooth via Discord. Highly recommend!", name:"Sarah Jenkins", role:"SaaS Founder" },
        { body:"aint no way this setup is this smooth lol. the performance is top-tier and the design looks like it costs $5k+. will definitely hire again for our next sprint.", name:"Devon K.", role:"Creative Director" },
      ];
      return (
        <section id="reviews" className="relative py-24 md:py-32">
          <div className="mx-auto max-w-6xl px-4">
            <SectionHeader
              eyebrow="What clients say"
              title={<><span className="text-gradient-silver">Words from the</span> <span className="text-gradient-neon">builders I work with.</span></>}
            />
            <div className="mt-12 grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-5">
              {reviews.map((r,i)=>(
                <figure key={i} className="relative rounded-2xl card-glass p-6 hover:-translate-y-1 hover:border-white/20 transition">
                  <div className="flex gap-0.5 text-amber-400">
                    {Array.from({length:5}).map((_,k)=>(<Icon key={k} name="star" className="h-4 w-4 text-amber-400 fill-amber-400" />))}
                  </div>
                  <blockquote className="mt-4 text-[15px] leading-relaxed text-white/85">&ldquo;{r.body}&rdquo;</blockquote>
                  <figcaption className="mt-5 flex items-center gap-3 border-t border-white/10 pt-4">
                    <div className="grid h-9 w-9 place-items-center rounded-full text-sm font-semibold text-black"
                      style={{background: i===0?"linear-gradient(135deg,#a78bfa,#7c3aed)":i===1?"linear-gradient(135deg,#22d3ee,#0ea5e9)":"linear-gradient(135deg,#34d399,#10b981)"}}>
                      {r.name.charAt(0)}
                    </div>
                    <div>
                      <div className="text-sm font-semibold text-white">{r.name}</div>
                      <div className="text-xs text-white/55">{r.role}</div>
                    </div>
                  </figcaption>
                </figure>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ---------------- Contact Form (2. Implement Contact Form) ---------------- */
    function Contact() {
      const [formState, setFormState] = useState({ name: '', email: '', message: '' });
      const [isSubmitted, setIsSubmitted] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        // Bu joyda backend yoki biron API xizmatiga ulanishi mumkin
        console.log("Form Data Submitted:", formState);
        setIsSubmitted(true);
      };

      return (
        <section id="contact" className="relative py-28 md:py-36">
          <div className="pointer-events-none absolute inset-0 -z-10">
            <div className="glow-orb float-slow" style={{width:620,height:620,background:"#10b981",bottom:-180,left:"50%",transform:"translateX(-50%)",opacity:.35}} />
            <div className="grid-bg absolute inset-0" />
          </div>
          <div className="mx-auto max-w-4xl px-4">
            <div className="text-center">
              <div className="mx-auto inline-flex items-center gap-2 rounded-full card-glass px-4 py-1.5 text-xs text-white/80">
                <span className="h-2 w-2 rounded-full bg-emerald-400 pulse-dot" />
                Booking 2 projects for Q3 2026
              </div>
              <h2 className="mt-6 font-display text-4xl md:text-6xl font-semibold tracking-tight">
                <span className="text-gradient-silver">Have an idea worth</span> <span className="text-gradient-neon">shipping beautifully?</span>
              </h2>
              <p className="mx-auto mt-5 max-w-xl text-white/70 text-sm md:text-base">
                Tell me about your product. I'll reply within 24 hours with a production timeline and a fixed budget.
              </p>
            </div>

            {/* Interaktiv Aloqa Formasi */}
            <div className="mt-12 max-w-md mx-auto rounded-2xl card-glass p-6 md:p-8 text-left">
              {isSubmitted ? (
                <div className="text-center py-8 animate-rise">
                  <div className="mx-auto grid h-12 w-12 place-items-center rounded-full bg-emerald-500/20 text-emerald-400 mb-4">
                    <Icon name="check" className="h-6 w-6" />
                  </div>
                  <h3 className="font-display text-xl font-semibold text-white">Message Sent Successfully!</h3>
                  <p className="mt-2 text-sm text-white/60">Thank you, I will reach back to you within 24 hours.</p>
                  <button onClick={() => setIsSubmitted(false)} className="mt-6 text-xs text-violet-400 hover:underline">Send another message</button>
                </div>
              ) : (
                <form onSubmit={handleSubmit} className="space-y-4">
                  <div>
                    <label htmlFor="form-name" className="block text-xs font-medium text-white/60 uppercase tracking-wider mb-1">Your Name</label>
                    <input 
                      id="form-name"
                      type="text" 
                      required 
                      value={formState.name}
                      onChange={(e) => setFormState({...formState, name: e.target.value})}
                      className="w-full bg-white/[0.04] border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/30 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition"
                      placeholder="John Doe"
                    />
                  </div>
                  <div>
                    <label htmlFor="form-email" className="block text-xs font-medium text-white/60 uppercase tracking-wider mb-1">Email Address</label>
                    <input 
                      id="form-email"
                      type="email" 
                      required 
                      value={formState.email}
                      onChange={(e) => setFormState({...formState, email: e.target.value})}
                      className="w-full bg-white/[0.04] border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/30 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition"
                      placeholder="john@example.com"
                    />
                  </div>
                  <div>
                    <label htmlFor="form-msg" className="block text-xs font-medium text-white/60 uppercase tracking-wider mb-1">Project Details</label>
                    <textarea 
                      id="form-msg"
                      rows="4" 
                      required 
                      value={formState.message}
                      onChange={(e) => setFormState({...formState, message: e.target.value})}
                      className="w-full bg-white/[0.04] border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/30 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition resize-none"
                      placeholder="Describe your project, timeline, and goals..."
                    />
                  </div>
                  <button type="submit" className="w-full py-3.5 rounded-xl btn-primary-glow text-sm font-semibold flex items-center justify-center gap-2 mt-2">
                    Send Proposal <Icon name="send" className="h-4 w-4" />
                  </button>
                </form>
              )}
            </div>

            <div className="mt-10 flex flex-wrap items-center justify-center gap-4">
              <a href="https://t.me/diyor_WA" target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 text-sm text-white/60 hover:text-white transition">
                <Icon name="send" className="h-4 w-4 text-sky-400" /> Or DM on Telegram
              </a>
            </div>
          </div>
        </section>
      );
    }

    /* ---------------- Footer ---------------- */
    function Footer() {
      return (
        <footer className="relative border-t border-white/10 py-10">
          <div className="mx-auto flex max-w-6xl flex-col items-center justify-between gap-4 px-4 md:flex-row">
            <div className="flex items-center gap-2 text-sm text-white/60">
              <span className="grid place-items-center h-7 w-7 rounded-md bg-gradient-to-br from-violet-500 to-cyan-400 text-black font-bold text-xs">D</span>
              <span>© {new Date().getFullYear()} Diyor Developer. All rights reserved.</span>
            </div>
            <div className="flex items-center gap-2">
              <SocialLink href="https://t.me/diyor_WA" label="Telegram" icon="send" />
              <SocialLink href="https://instagram.com/" label="Instagram" icon="instagram" />
              <SocialLink href="https://github.com/" label="GitHub" icon="github" />
            </div>
          </div>
        </footer>
      );
    }

    function SocialLink({ href, label, icon }) {
      return (
        <a href={href} target="_blank" rel="noreferrer" aria-label={label}
          className="grid h-9 w-9 place-items-center rounded-lg border border-white/25 bg-white/[0.08] text-white/90 transition hover:text-white hover:border-white/45 hover:bg-white/[0.14] shadow-[0_0_12px_-4px_rgba(255,255,255,0.1)]">
          <Icon name={icon} />
        </a>
      );
    }

    /* ---------------- Helpers ---------------- */
    function SectionHeader({ eyebrow, title, sub }) {
      return (
        <div className="mx-auto max-w-2xl text-center">
          <div className="text-[11px] uppercase tracking-[0.24em] text-white/50">{eyebrow}</div>
          <h2 className="mt-3 font-display text-3xl md:text-5xl font-semibold tracking-tight">{title}</h2>
          {sub && <p className="mt-4 text-white/65 text-sm md:text-base">{sub}</p>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Portfolio />);
  </script>
</body>
</html>
